<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>hermit os</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #000; color: #fff; }
        ::-webkit-scrollbar { display: none; }
        .slide-up-enter { animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .fade-in { animation: fadeIn 0.2s ease-out forwards; }
        @keyframes slideUp { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        [x-cloak] { display: none !important; }
    </style>
</head>

<body class="h-screen w-full overflow-hidden flex selection:bg-white selection:text-black" x-data="hermitApp()">
    <aside class="w-28 h-full p-6 flex flex-col items-center justify-between z-20">
        <div class="w-16 h-16 bg-white rounded-full flex items-center justify-center text-black shadow-[0_0_30px_rgba(255,255,255,0.3)]">
            <i data-lucide="cpu" class="w-8 h-8"></i>
        </div>

        <nav class="flex flex-col gap-6">
            <template x-for="tab in tabs" :key="tab.id">
                <button @click="currentTab = tab.id"
                        class="w-14 h-14 rounded-full flex items-center justify-center transition-all duration-300 relative group"
                        :class="currentTab === tab.id ? 'bg-zinc-800 text-white shadow-inner' : 'text-zinc-500 hover:bg-zinc-900 hover:text-white'">
                    <i :data-lucide="tab.icon" class="w-6 h-6"></i>
                    <span class="absolute left-20 bg-white text-black text-xs font-bold px-3 py-2 rounded-full opacity-0 group-hover:opacity-100 transition-opacity whitespace-nowrap z-50 pointer-events-none shadow-lg" x-text="tab.name"></span>
                </button>
            </template>
        </nav>

        <button class="w-14 h-14 rounded-full bg-zinc-900 text-zinc-500 flex items-center justify-center hover:bg-zinc-800 hover:text-white transition-all group relative">
            <i data-lucide="settings" class="w-6 h-6"></i>
            <span class="absolute left-20 bg-white text-black text-xs font-bold px-3 py-2 rounded-full opacity-0 group-hover:opacity-100 transition-opacity whitespace-nowrap z-50 pointer-events-none shadow-lg">settings</span>
        </button>
    </aside>

    <main class="flex-1 h-full py-6 pr-6 pl-0">
        <div class="w-full h-full bg-zinc-950 rounded-[3rem] border border-zinc-800 p-12 overflow-y-auto relative flex flex-col shadow-2xl">
            <header class="flex justify-between items-end mb-12 shrink-0">
                <div>
                    <h1 class="text-4xl font-black tracking-tight lowercase" x-text="getCurrentTabName()"></h1>
                    <div class="flex items-center gap-2 mt-3 text-sm font-medium" :class="wsConnected ? 'text-zinc-500' : 'text-red-400'">
                        <div class="w-2.5 h-2.5 rounded-full" :class="wsConnected ? 'bg-white animate-pulse' : 'bg-red-500'"></div>
                        <span x-text="wsConnected ? 'live socket connection active' : 'reconnecting to daemon...'"></span>
                    </div>
                </div>

                <button x-show="currentTab === 'agents'" @click="activeModal = 'createAgent'; createStep = 1"
                        class="bg-white text-black px-8 py-4 rounded-full font-bold text-sm hover:scale-105 active:scale-95 transition-all shadow-[0_0_20px_rgba(255,255,255,0.15)] flex items-center gap-2">
                    <i data-lucide="plus" class="w-4 h-4"></i> deploy agent
                </button>
            </header>

            <div x-show="currentTab === 'agents'" x-cloak class="flex-1">
                <div class="grid grid-cols-1 xl:grid-cols-2 2xl:grid-cols-3 gap-6">
                    <template x-if="loadingAgents">
                        <div class="col-span-full grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div class="h-40 rounded-[2rem] bg-zinc-900 animate-pulse"></div>
                            <div class="h-40 rounded-[2rem] bg-zinc-900 animate-pulse"></div>
                        </div>
                    </template>

                    <template x-if="!loadingAgents && agents.length === 0">
                        <div class="col-span-full flex flex-col items-center justify-center h-64 text-zinc-500 bg-black rounded-[2.5rem] border border-zinc-800 border-dashed">
                            <div class="w-16 h-16 rounded-full bg-zinc-900 flex items-center justify-center mb-4">
                                <i data-lucide="bot" class="w-6 h-6 text-zinc-600"></i>
                            </div>
                            <p class="font-medium text-sm">no agents running. deploy one to get started.</p>
                        </div>
                    </template>

                    <template x-for="agent in agents" :key="agent.id">
                        <div class="bg-black border border-zinc-800 rounded-[2.5rem] p-8 hover:border-zinc-700 transition-colors flex flex-col relative overflow-hidden group">
                            <div class="flex justify-between items-start mb-6">
                                <div class="w-16 h-16 bg-zinc-900 rounded-full flex items-center justify-center text-2xl font-black shadow-inner border border-zinc-800">
                                    <span x-text="agent.name.charAt(0)"></span>
                                </div>
                                <div class="px-4 py-1.5 rounded-full text-[10px] font-bold uppercase tracking-widest bg-zinc-900 text-white flex items-center gap-2">
                                    <div class="w-1.5 h-1.5 rounded-full bg-green-400"></div>
                                    <span x-text="agent.status || 'running'"></span>
                                </div>
                            </div>

                            <h3 class="text-3xl font-bold tracking-tight mb-2" x-text="agent.name"></h3>
                            <p class="text-sm text-zinc-500 mb-8 lowercase" x-text="agent.role"></p>

                            <div class="mt-auto grid grid-cols-2 gap-3">
                                <button @click="openTestConsole(agent)" class="bg-zinc-900 hover:bg-zinc-800 text-white rounded-full py-3.5 text-xs font-bold transition-colors">chat / test</button>
                                <button @click="activeModal = 'skills'" class="bg-zinc-900 hover:bg-zinc-800 text-white rounded-full py-3.5 text-xs font-bold transition-colors">skills</button>
                            </div>
                        </div>
                    </template>
                </div>
            </div>

            <div x-show="currentTab === 'health'" x-cloak class="flex-1 flex flex-col gap-6">
                <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                    <div class="bg-black border border-zinc-800 rounded-[2.5rem] p-8 flex flex-col justify-between">
                        <span class="text-zinc-500 text-sm font-medium lowercase flex items-center gap-2"><i data-lucide="cpu" class="w-4 h-4"></i> host cpu</span>
                        <div class="mt-6 flex items-baseline gap-2">
                            <span class="text-6xl font-black tracking-tighter" x-text="(metrics.host?.cpuPercent || 0).toFixed(1)"></span>
                            <span class="text-2xl font-bold text-zinc-600">%</span>
                        </div>
                    </div>
                    <div class="bg-black border border-zinc-800 rounded-[2.5rem] p-8 flex flex-col justify-between">
                        <span class="text-zinc-500 text-sm font-medium lowercase flex items-center gap-2"><i data-lucide="memory-stick" class="w-4 h-4"></i> memory footprint</span>
                        <div class="mt-6 flex items-baseline gap-2">
                            <span class="text-6xl font-black tracking-tighter" x-text="formatBytes(metrics.host?.memoryUsed).split(' ')[0]"></span>
                            <span class="text-lg font-bold text-zinc-600 lowercase" x-text="formatBytes(metrics.host?.memoryUsed).split(' ')[1] + ' / ' + formatBytes(metrics.host?.memoryTotal)"></span>
                        </div>
                    </div>
                    <div class="bg-black border border-zinc-800 rounded-[2.5rem] p-8 flex flex-col justify-between">
                        <span class="text-zinc-500 text-sm font-medium lowercase flex items-center gap-2"><i data-lucide="hard-drive" class="w-4 h-4"></i> disk allocation</span>
                        <div class="mt-6 flex items-baseline gap-2">
                            <span class="text-6xl font-black tracking-tighter" x-text="formatBytes(metrics.host?.diskUsed).split(' ')[0]"></span>
                            <span class="text-lg font-bold text-zinc-600 lowercase" x-text="formatBytes(metrics.host?.diskUsed).split(' ')[1] + ' used'"></span>
                        </div>
                    </div>
                </div>

                <div class="bg-black border border-zinc-800 rounded-[2.5rem] p-8 flex-1 overflow-hidden flex flex-col">
                    <h3 class="text-xl font-bold mb-6 lowercase">active cubicles (containers)</h3>
                    <div class="space-y-3 overflow-y-auto pr-2">
                        <template x-if="!metrics.containers || metrics.containers.length === 0">
                            <p class="text-zinc-500 text-sm">no active containers processing right now.</p>
                        </template>
                        <template x-for="c in metrics.containers" :key="c.name">
                            <div class="flex items-center justify-between p-5 bg-zinc-950 rounded-3xl border border-zinc-800/50">
                                <span class="font-bold text-white text-lg" x-text="c.name"></span>
                                <div class="flex gap-8 text-sm font-medium text-zinc-400">
                                    <span class="flex items-center gap-2"><i data-lucide="cpu" class="w-4 h-4"></i> <span x-text="(c.cpuPercent || 0).toFixed(1) + '%'"></span></span>
                                    <span class="flex items-center gap-2"><i data-lucide="memory-stick" class="w-4 h-4"></i> <span x-text="(c.memUsageMB || 0).toFixed(1) + ' mb'"></span></span>
                                </div>
                            </div>
                        </template>
                    </div>
                </div>
            </div>

            <div x-show="currentTab === 'apps' || currentTab === 'calendar'" x-cloak class="flex-1">
                <div class="flex flex-col items-center justify-center h-full text-zinc-500 bg-black rounded-[3rem] border border-zinc-800">
                    <div class="w-24 h-24 rounded-full border border-zinc-800 flex items-center justify-center mb-6 shadow-lg">
                        <i :data-lucide="tabs.find(t => t.id === currentTab).icon" class="w-10 h-10 text-zinc-400"></i>
                    </div>
                    <p class="font-medium text-lg lowercase" x-text="currentTab + ' module'"></p>
                    <p class="text-sm text-zinc-600 mt-2 lowercase">this panel is awaiting data.</p>
                </div>
            </div>
        </div>
    </main>

    <div x-show="activeModal === 'createAgent'" x-cloak class="fixed inset-0 bg-black/90 backdrop-blur-md flex items-center justify-center z-50 p-6 fade-in">
        <div class="bg-zinc-950 border border-zinc-800 w-full max-w-2xl rounded-[3rem] p-10 relative shadow-2xl flex flex-col" @click.stop>
            <button @click="activeModal = null" class="absolute top-8 right-8 w-10 h-10 bg-zinc-900 rounded-full flex items-center justify-center text-zinc-500 hover:text-white hover:bg-zinc-800 transition-all"><i data-lucide="x" class="w-5 h-5"></i></button>

            <h2 class="text-3xl font-black text-white mb-2 lowercase">new deployment</h2>
            <p class="text-zinc-500 text-sm lowercase mb-10 border-b border-zinc-800 pb-6" x-text="'stage ' + createStep + ' of 4'"></p>

            <div x-show="createStep === 1" class="space-y-5 flex-1">
                <div>
                    <label class="text-xs font-bold text-zinc-500 uppercase tracking-widest pl-4 mb-2 block">Agent Name</label>
                    <input type="text" x-model="newAgent.name" placeholder="e.g. Ralph" class="w-full bg-black border border-zinc-800 rounded-full px-6 py-4 text-white focus:outline-none focus:border-white transition-colors">
                </div>
                <div>
                    <label class="text-xs font-bold text-zinc-500 uppercase tracking-widest pl-4 mb-2 block">Role</label>
                    <input type="text" x-model="newAgent.role" placeholder="e.g. Code Assistant" class="w-full bg-black border border-zinc-800 rounded-full px-6 py-4 text-white focus:outline-none focus:border-white transition-colors">
                </div>
                <div>
                    <label class="text-xs font-bold text-zinc-500 uppercase tracking-widest pl-4 mb-2 block">Personality</label>
                    <input type="text" x-model="newAgent.personality" placeholder="e.g. Witty and concise" class="w-full bg-black border border-zinc-800 rounded-full px-6 py-4 text-white focus:outline-none focus:border-white transition-colors">
                </div>
                <div class="flex justify-end pt-4"><button @click="createStep = 2" class="bg-white text-black px-8 py-4 rounded-full font-bold">next stage</button></div>
            </div>

            <div x-show="createStep === 2" x-cloak class="space-y-5 flex-1">
                <div>
                    <label class="text-xs font-bold text-zinc-500 uppercase tracking-widest pl-4 mb-2 block">Provider</label>
                    <select x-model="newAgent.provider" class="w-full bg-black border border-zinc-800 rounded-full px-6 py-4 text-white focus:outline-none focus:border-white appearance-none">
                        <option value="openrouter">OpenRouter</option>
                        <option value="gemini">Google Gemini</option>
                        <option value="openai">OpenAI</option>
                        <option value="anthropic">Anthropic</option>
                    </select>
                </div>
                <div>
                    <label class="text-xs font-bold text-zinc-500 uppercase tracking-widest pl-4 mb-2 block">Model String</label>
                    <input type="text" x-model="newAgent.model" placeholder="openai/gpt-5.2" class="w-full bg-black border border-zinc-800 rounded-full px-6 py-4 text-white focus:outline-none focus:border-white transition-colors">
                </div>
                <div class="flex justify-between pt-4">
                    <button @click="createStep = 1" class="px-6 py-4 text-zinc-500 font-bold hover:text-white">back</button>
                    <button @click="createStep = 3" class="bg-white text-black px-8 py-4 rounded-full font-bold">next stage</button>
                </div>
            </div>

            <div x-show="createStep === 3" x-cloak class="space-y-5 flex-1">
                <div>
                    <label class="text-xs font-bold text-zinc-500 uppercase tracking-widest pl-4 mb-2 block">Telegram Bot Token</label>
                    <input type="text" x-model="newAgent.tgToken" placeholder="From @BotFather" class="w-full bg-black border border-zinc-800 rounded-full px-6 py-4 text-white focus:outline-none focus:border-white transition-colors font-mono text-sm">
                </div>
                <div>
                    <label class="text-xs font-bold text-zinc-500 uppercase tracking-widest pl-4 mb-2 block">Allowed User ID</label>
                    <input type="text" x-model="newAgent.tgUserId" placeholder="Your Telegram ID" class="w-full bg-black border border-zinc-800 rounded-full px-6 py-4 text-white focus:outline-none focus:border-white transition-colors font-mono text-sm">
                </div>
                <div class="flex justify-between pt-4">
                    <button @click="createStep = 2" class="px-6 py-4 text-zinc-500 font-bold hover:text-white">back</button>
                    <button @click="sendVerificationCode()" class="bg-white text-black px-8 py-4 rounded-full font-bold">send code</button>
                </div>
            </div>

            <div x-show="createStep === 4" x-cloak class="space-y-5 flex-1 flex flex-col items-center justify-center text-center">
                <i data-lucide="smartphone" class="w-12 h-12 text-zinc-500 mb-4"></i>
                <p class="text-zinc-400 mb-6">We've sent a 6-digit code to your Telegram.<br>Enter it below to verify linking.</p>
                <input type="text" x-model="newAgent.pinCode" placeholder="000000" class="w-48 bg-black border border-zinc-800 rounded-full px-6 py-4 text-white focus:outline-none focus:border-white transition-colors text-center tracking-[0.5em] font-black text-2xl">
                <div class="flex justify-between w-full pt-8">
                    <button @click="createStep = 3" class="px-6 py-4 text-zinc-500 font-bold hover:text-white">back</button>
                    <button @click="submitNewAgent()" class="bg-white text-black px-8 py-4 rounded-full font-bold">verify & launch</button>
                </div>
            </div>
        </div>
    </div>

    <div x-show="activeModal === 'testConsole'" x-cloak class="fixed inset-0 bg-black/90 backdrop-blur-md flex items-center justify-center z-50 p-8 fade-in">
        <div class="bg-zinc-950 border border-zinc-800 w-full max-w-7xl h-[90vh] rounded-[3rem] flex flex-col overflow-hidden shadow-2xl">
            <div class="p-8 border-b border-zinc-800 flex justify-between items-center bg-black">
                <div>
                    <h3 class="text-2xl font-black text-white lowercase">test console <span class="text-zinc-500 font-medium" x-text="'/ ' + (testTargetAgent?.name || '')"></span></h3>
                    <p class="text-sm text-zinc-500 lowercase mt-1">simulate llm payloads and view the real-time active zone responses.</p>
                </div>
                <div class="flex items-center gap-3">
                    <button @click="seedTest('<terminal>ls -la /app/workspace/work</terminal>\n<message>Checking files...</message>')" class="px-5 py-2.5 bg-zinc-900 rounded-full text-xs font-bold text-white hover:bg-zinc-800 transition-colors">load terminal demo</button>
                    <button @click="activeModal = null" class="w-10 h-10 ml-4 bg-zinc-900 rounded-full flex items-center justify-center text-zinc-500 hover:text-white hover:bg-zinc-800 transition-all"><i data-lucide="x" class="w-5 h-5"></i></button>
                </div>
            </div>

            <div class="flex-1 flex overflow-hidden">
                <div class="w-1/2 border-r border-zinc-800 p-8 overflow-y-auto space-y-4 bg-zinc-950" id="test-logs-container">
                    <template x-for="(log, idx) in testLogs" :key="idx">
                        <div class="border rounded-3xl p-6 text-xs font-mono slide-up-enter"
                             :class="{
                                'border-yellow-500/30 bg-yellow-500/10 text-yellow-200': log.source === 'dashboard',
                                'border-emerald-500/30 bg-emerald-500/10 text-emerald-200': log.source === 'system',
                                'border-blue-500/30 bg-blue-500/10 text-blue-200': log.source === 'telegram'
                             }">
                            <p class="font-bold mb-2 uppercase tracking-widest opacity-50" x-text="log.source"></p>
                            <pre class="whitespace-pre-wrap break-words" x-text="JSON.stringify(log.payload, null, 2)"></pre>
                        </div>
                    </template>
                </div>

                <div class="w-1/2 p-8 flex flex-col bg-black">
                    <label class="text-xs font-bold text-zinc-500 uppercase tracking-widest pl-4 mb-4 block">XML Payload</label>
                    <textarea x-model="testInput" class="flex-1 bg-zinc-950 border border-zinc-800 rounded-[2rem] p-8 text-sm text-zinc-300 font-mono focus:outline-none focus:border-zinc-600 resize-none shadow-inner" placeholder="<message>Hello world</message>"></textarea>
                    <div class="mt-6 flex justify-end">
                        <button @click="submitTest()" class="bg-white text-black px-10 py-4 rounded-full font-bold hover:scale-105 active:scale-95 transition-all flex items-center gap-2">
                            <i data-lucide="send" class="w-4 h-4"></i> execute payload
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div x-show="activeModal === 'skills'" x-cloak class="fixed inset-0 bg-black/90 backdrop-blur-md flex items-center justify-center z-50 p-8 fade-in">
        <div class="bg-zinc-950 border border-zinc-800 w-full max-w-6xl h-[85vh] rounded-[3rem] flex flex-col overflow-hidden shadow-2xl">
            <div class="p-6 border-b border-zinc-800 flex items-center justify-between bg-black">
                <h3 class="text-2xl font-black lowercase">skills manager</h3>
                <button @click="activeModal = null" class="w-10 h-10 bg-zinc-900 rounded-full flex items-center justify-center text-zinc-500 hover:text-white hover:bg-zinc-800 transition-all"><i data-lucide="x" class="w-5 h-5"></i></button>
            </div>
            <div class="flex-1 grid grid-cols-12">
                <div class="col-span-4 border-r border-zinc-800 p-6 overflow-y-auto space-y-2">
                    <template x-for="s in skills" :key="s.id">
                        <button @click="editSkill = s" class="w-full text-left p-4 rounded-2xl border border-zinc-800 bg-black hover:border-zinc-700 transition-colors">
                            <p class="font-bold" x-text="s.title"></p>
                            <p class="text-xs text-zinc-500 mt-1" x-text="s.description"></p>
                        </button>
                    </template>
                    <template x-if="skills.length === 0">
                        <p class="text-sm text-zinc-500">no skills yet.</p>
                    </template>
                </div>
                <div class="col-span-8 p-6 flex flex-col gap-3 bg-black">
                    <input x-model="editSkill.title" placeholder="Skill title (example.md)" class="bg-zinc-950 border border-zinc-800 rounded-2xl px-4 py-3 text-sm">
                    <input x-model="editSkill.description" placeholder="Short description" class="bg-zinc-950 border border-zinc-800 rounded-2xl px-4 py-3 text-sm">
                    <textarea x-model="editSkill.content" class="flex-1 bg-zinc-950 border border-zinc-800 rounded-2xl p-4 text-sm font-mono" placeholder="# Skill content"></textarea>
                    <div class="flex justify-end gap-2">
                        <button @click="deleteSkill()" class="px-5 py-2.5 rounded-full bg-zinc-800 text-zinc-300 text-sm font-bold">delete</button>
                        <button @click="saveSkill()" class="px-5 py-2.5 rounded-full bg-white text-black text-sm font-bold">save</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="fixed bottom-10 right-10 z-[100] flex flex-col gap-3 pointer-events-none">
        <template x-for="toast in toasts" :key="toast.id">
            <div class="bg-white text-black px-6 py-4 rounded-full font-bold text-sm shadow-[0_10px_40px_rgba(255,255,255,0.2)] flex items-center gap-3 slide-up-enter pointer-events-auto">
                <i data-lucide="check-circle" class="w-5 h-5 text-black"></i>
                <span x-text="toast.message"></span>
            </div>
        </template>
    </div>

    <script>
        document.addEventListener('alpine:init', () => {
            Alpine.data('hermitApp', () => ({
                currentTab: 'agents',
                activeModal: null,
                tabs: [
                    { id: 'agents', name: 'your agents', icon: 'users' },
                    { id: 'health', name: 'system health', icon: 'activity' },
                    { id: 'apps', name: 'published apps', icon: 'layout-grid' },
                    { id: 'calendar', name: 'calendar', icon: 'calendar' }
                ],

                wsConnected: false,
                metrics: { host: null, containers: [] },
                agents: [],
                loadingAgents: true,
                toasts: [],
                skills: [],
                editSkill: { id: null, title: '', description: '', content: '' },

                createStep: 1,
                newAgent: { name: '', role: '', personality: '', provider: 'openrouter', model: '', tgToken: '', tgUserId: '', pinCode: '' },

                testTargetAgent: null,
                testInput: '',
                testLogs: [],

                init() {
                    this.fetchAgents();
                    this.fetchSkills();
                    this.fetchMetrics();
                    this.connectWebSocket();
                    setInterval(() => { if (!this.wsConnected) this.fetchMetrics(); }, 2000);
                    this.$watch('currentTab', () => { this.$nextTick(() => lucide.createIcons()); });
                    this.$watch('metrics', () => { this.$nextTick(() => lucide.createIcons()); });
                    this.$watch('activeModal', () => { this.$nextTick(() => lucide.createIcons()); });
                    this.$nextTick(() => lucide.createIcons());
                },

                getCurrentTabName() {
                    return this.tabs.find(t => t.id === this.currentTab)?.name || '';
                },

                async fetchAgents() {
                    try {
                        const r = await fetch('/api/agents');
                        this.agents = await r.json() || [];
                    } catch (_) {
                        this.showToast('Failed to load agents');
                    } finally {
                        this.loadingAgents = false;
                    }
                },

                async fetchSkills() {
                    try {
                        const r = await fetch('/api/skills');
                        this.skills = await r.json() || [];
                    } catch (_) {}
                },

                async fetchMetrics() {
                    try {
                        const r = await fetch('/api/metrics');
                        this.metrics = await r.json();
                    } catch (_) {}
                },

                connectWebSocket() {
                    const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
                    const ws = new WebSocket(`${protocol}//${location.host}/ws`);
                    ws.onopen = () => { this.wsConnected = true; };
                    ws.onmessage = (event) => {
                        const msg = JSON.parse(event.data);
                        if (msg.type === 'metrics') {
                            this.metrics = msg.data;
                        } else if (msg.type === 'toast' && msg.data?.message) {
                            this.showToast(msg.data.message);
                        }
                    };
                    ws.onclose = () => {
                        this.wsConnected = false;
                        setTimeout(() => this.connectWebSocket(), 3000);
                    };
                },

                async sendVerificationCode() {
                    if (!this.newAgent.tgToken || !this.newAgent.tgUserId) {
                        this.showToast('Please fill out token and user ID');
                        return;
                    }
                    try {
                        const res = await fetch('/api/telegram/send-code', {
                            method: 'POST',
                            headers: {'Content-Type': 'application/json'},
                            body: JSON.stringify({Token: this.newAgent.tgToken, UserID: this.newAgent.tgUserId})
                        });
                        if (!res.ok) throw new Error('send failed');
                        this.createStep = 4;
                    } catch (_) {
                        this.showToast('Failed to send code');
                    }
                },

                async submitNewAgent() {
                    try {
                        const verifyRes = await fetch('/api/telegram/verify', {
                            method: 'POST',
                            headers: {'Content-Type': 'application/json'},
                            body: JSON.stringify({Token: this.newAgent.tgToken, UserID: this.newAgent.tgUserId, Code: this.newAgent.pinCode})
                        });
                        const verifyData = await verifyRes.json();
                        if (!verifyRes.ok || !verifyData.success) {
                            this.showToast(verifyData.error || 'Verification failed');
                            return;
                        }

                        const res = await fetch('/api/agents', {
                            method: 'POST',
                            headers: {'Content-Type': 'application/json'},
                            body: JSON.stringify({
                                name: this.newAgent.name,
                                role: this.newAgent.role,
                                personality: this.newAgent.personality,
                                provider: this.newAgent.provider,
                                model: this.newAgent.model,
                                telegram_token: this.newAgent.tgToken,
                                telegram_id: this.newAgent.tgUserId
                            })
                        });
                        if (!res.ok) throw new Error('create failed');

                        this.showToast('Agent deployed successfully!');
                        this.activeModal = null;
                        this.createStep = 1;
                        this.newAgent = { name: '', role: '', personality: '', provider: 'openrouter', model: '', tgToken: '', tgUserId: '', pinCode: '' };
                        await this.fetchAgents();
                    } catch (_) {
                        this.showToast('Failed to verify and deploy');
                    }
                },

                openTestConsole(agent) {
                    this.testTargetAgent = agent;
                    this.testLogs = [];
                    this.testInput = '';
                    this.activeModal = 'testConsole';
                },
                seedTest(str) { this.testInput = str; },
                async submitTest() {
                    if (!this.testInput.trim() || !this.testTargetAgent) return;
                    this.testLogs.push({ source: 'dashboard', payload: { raw_xml: this.testInput } });
                    try {
                        const res = await fetch('/api/test-contract', {
                            method: 'POST',
                            headers: {'Content-Type': 'application/json'},
                            body: JSON.stringify({ payload: this.testInput, userId: String(this.testTargetAgent.id) })
                        });
                        const data = await res.json();
                        this.testLogs.push({ source: 'system', payload: data });
                        setTimeout(() => {
                            const container = document.getElementById('test-logs-container');
                            if (container) container.scrollTop = container.scrollHeight;
                        }, 50);
                    } catch (_) {
                        this.showToast('Error executing payload');
                    }
                },

                async saveSkill() {
                    try {
                        const res = await fetch('/api/skills', {
                            method: 'POST',
                            headers: {'Content-Type': 'application/json'},
                            body: JSON.stringify(this.editSkill)
                        });
                        if (!res.ok) throw new Error('save failed');
                        this.showToast('Skill saved');
                        await this.fetchSkills();
                    } catch (_) {
                        this.showToast('Failed to save skill');
                    }
                },

                async deleteSkill() {
                    if (!this.editSkill?.id) return;
                    try {
                        const res = await fetch(`/api/skills/${this.editSkill.id}`, { method: 'DELETE' });
                        if (!res.ok) throw new Error('delete failed');
                        this.editSkill = { id: null, title: '', description: '', content: '' };
                        this.showToast('Skill deleted');
                        await this.fetchSkills();
                    } catch (_) {
                        this.showToast('Failed to delete skill');
                    }
                },

                showToast(message) {
                    const id = Date.now();
                    this.toasts.push({ id, message });
                    setTimeout(() => { this.toasts = this.toasts.filter(t => t.id !== id); }, 3500);
                },

                formatBytes(bytes) {
                    if (!bytes) return '0 B';
                    const k = 1024, sizes = ['b', 'kb', 'mb', 'gb', 'tb'], i = Math.floor(Math.log(bytes) / Math.log(k));
                    return parseFloat((bytes / Math.pow(k, i)).toFixed(1)) + ' ' + sizes[i];
                }
            }));
        });
    </script>
</body>
</html>
