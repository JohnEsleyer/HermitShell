<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>hermit os</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <style>
    body { background:#000; color:#fff; font-family: Inter, system-ui, sans-serif; }
    [x-cloak]{ display:none !important; }
  </style>
</head>
<body class="min-h-screen p-6" x-data="hermitApp()">
  <header class="flex items-center justify-between mb-6">
    <h1 class="text-3xl font-black lowercase">hermit dashboard</h1>
    <div class="text-sm" :class="wsConnected ? 'text-zinc-300' : 'text-red-400'" x-text="wsConnected ? 'live connection active' : 'reconnecting...'" ></div>
  </header>

  <section class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
    <div class="rounded-3xl border border-zinc-800 bg-zinc-950 p-5">
      <p class="text-zinc-500 text-sm">cpu</p>
      <p class="text-4xl font-bold" x-text="(metrics.host?.cpuPercent || 0).toFixed(1) + '%' "></p>
    </div>
    <div class="rounded-3xl border border-zinc-800 bg-zinc-950 p-5">
      <p class="text-zinc-500 text-sm">memory</p>
      <p class="text-2xl font-bold"><span x-text="formatBytes(metrics.host?.memoryUsed)"></span> / <span x-text="formatBytes(metrics.host?.memoryTotal)"></span></p>
    </div>
    <div class="rounded-3xl border border-zinc-800 bg-zinc-950 p-5">
      <p class="text-zinc-500 text-sm">disk used</p>
      <p class="text-2xl font-bold" x-text="formatBytes(metrics.host?.diskUsed)"></p>
    </div>
  </section>

  <section class="rounded-3xl border border-zinc-800 bg-zinc-950 p-5">
    <h2 class="font-bold mb-3">agents</h2>
    <template x-if="loadingAgents">
      <div class="space-y-2">
        <div class="h-10 rounded-xl bg-zinc-900 animate-pulse"></div>
        <div class="h-10 rounded-xl bg-zinc-900 animate-pulse"></div>
      </div>
    </template>
    <template x-if="!loadingAgents && agents.length === 0">
      <p class="text-zinc-500 text-sm">no agents found</p>
    </template>
    <div class="space-y-2" x-show="!loadingAgents">
      <template x-for="a in agents" :key="a.id">
        <div class="rounded-xl border border-zinc-800 p-3 flex items-center justify-between">
          <div>
            <p class="font-semibold" x-text="a.name"></p>
            <p class="text-xs text-zinc-500" x-text="a.role"></p>
          </div>
          <div class="text-xs uppercase text-zinc-400" x-text="a.status"></div>
        </div>
      </template>
    </div>
  </section>

  <div class="fixed bottom-6 right-6 space-y-2">
    <template x-for="toast in toasts" :key="toast.id">
      <div class="bg-white text-black px-4 py-2 rounded-full text-sm font-semibold" x-text="toast.message"></div>
    </template>
  </div>

<script>
document.addEventListener('alpine:init', () => {
  Alpine.data('hermitApp', () => ({
    wsConnected: false,
    metrics: { host: null, containers: [] },
    agents: [],
    loadingAgents: true,
    toasts: [],
    init() {
      this.fetchAgents();
      this.connectWebSocket();
      this.startMetricsFallback();
    },
    async fetchAgents() {
      try {
        const r = await fetch('/api/agents');
        this.agents = await r.json();
      } catch (_) {
        this.showToast('failed to load agents');
      } finally {
        this.loadingAgents = false;
      }
    },

    startMetricsFallback() {
      setInterval(async () => {
        if (this.wsConnected) return;
        try {
          const r = await fetch('/api/metrics');
          this.metrics = await r.json();
        } catch (_) {}
      }, 1000);
    },
    connectWebSocket() {
      const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
      const ws = new WebSocket(`${protocol}//${location.host}/ws`);
      ws.onopen = () => this.wsConnected = true;
      ws.onmessage = (event) => {
        const msg = JSON.parse(event.data);
        if (msg.type === 'metrics') this.metrics = msg.data;
        if (msg.type === 'toast' && msg.data?.message) this.showToast(msg.data.message);
      };
      ws.onclose = () => {
        this.wsConnected = false;
        setTimeout(() => this.connectWebSocket(), 2000);
      };
    },
    showToast(message) {
      const id = Date.now();
      this.toasts.push({ id, message });
      setTimeout(() => this.toasts = this.toasts.filter(t => t.id !== id), 3500);
    },
    formatBytes(bytes) {
      if (!bytes) return '0 B';
      const units = ['B', 'KB', 'MB', 'GB', 'TB'];
      let i = 0, n = bytes;
      while (n >= 1024 && i < units.length - 1) { n /= 1024; i++; }
      return `${n.toFixed(1)} ${units[i]}`;
    }
  }))
})
</script>
</body>
</html>
